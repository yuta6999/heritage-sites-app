<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>tag trip - 世界遺産ハッシュタグの旅</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">
    <div id="trip-screen" class="main-content" style="display: flex; flex-direction: column; height: 100%;">
        <div class="progress-bar"><span id="current-step">1</span> / 10 STEPS</div>
        
        <div class="main-content">
            <div class="heritage-header">
                <h1 id="heritage-name" class="heritage-title">読み込み中...</h1>
                <div id="heritage-english" class="heritage-subtitle">Loading...</div>
            </div>
            
            <p id="heritage-remarks" class="heritage-remarks">読み込み中...</p>
            
            <div class="meta-grid">
                <div class="meta-item"><span class="meta-label">国名</span><span id="meta-country" class="meta-value">-</span></div>
                <div class="meta-item"><span class="meta-label">登録区分</span><span id="meta-category" class="meta-value">-</span></div>
                <div class="meta-item"><span class="meta-label">登録年</span><span id="meta-year" class="meta-value">-</span></div>
                <div class="meta-item"><span class="meta-label">登録基準</span><span id="meta-criteria" class="meta-value">-</span></div>
            </div>
        </div>

        <div class="bottom-area">
            <div id="zone-instruction" class="zone-label">ハッシュタグを選んで次の旅へ</div>
            <div class="tags-container" id="tags-box"></div>
        </div>
    </div>

    <div id="result-screen" class="main-content hidden" style="display: flex; flex-direction: column; height: 100%;">
        <div class="progress-bar">TRIP COMPLETED</div>
        <h1 class="heritage-title" style="text-align: center; margin-bottom: 20px;">10個の旅の記憶</h1>
        
        <div class="main-content" id="history-box-container">
            <ul class="history-list" id="history-box"></ul>
        </div>
        
        <div class="bottom-area" style="height: auto; margin-top: auto; border: none; padding-top: 0;">
            <button class="share-btn" onclick="shareTrip()">旅の記憶をシェアする</button>
        </div>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
